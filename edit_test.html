        function dataURLtoFile(dataurl) {
            // dataurl is like "data:image/png;base64,iVBORw0KGgo…"
            const [hdr, b64] = dataurl.split(',');
            const mime = hdr.match(/:(.*?);/)[1];
            const bin  = atob(b64), len = bin.length;
            const u8   = new Uint8Array(len);
            for (let i = 0; i < len; i++) u8[i] = bin.charCodeAt(i);
            // extract extension from the mime
            const ext = mime.split('/')[1];
            // we give every file the same dummy name the server will re‑name in sequence
            return new File([u8], `photo.${ext}`, { type: mime });
        }
