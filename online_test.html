<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн тест - Хогвартс</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .test-list { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .test-item { 
            padding: 1rem 2rem; 
            border: 2px solid var(--border-primary); 
            border-radius: var(--radius-lg); 
            cursor: pointer;
            background: var(--bg-card);
            transition: all var(--transition-fast);
        }
        .test-item:hover { border-color: var(--primary-purple); transform: translateY(-2px); }
        .test-item.selected { 
            background: var(--gradient-primary); 
            color: white; 
            border-color: var(--primary-purple);
        }
        #questionContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .question-row { 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }
        .choices { display: flex; gap: 0.5rem; }
        .choice { 
            padding: 0.5rem; 
            border: 2px solid var(--border-secondary); 
            border-radius: 50%; 
            text-align: center; 
            width: 2rem; 
            height: 2rem; 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            background: var(--bg-card);
            transition: all var(--transition-fast);
        }
        .choice:hover { border-color: var(--primary-purple); }
        .choice.selected.first { background: var(--primary-purple); border-color: var(--primary-purple); color: white; }
        .choice.selected.changed { background: var(--primary-gold); border-color: var(--primary-gold); color: #1c1917; border-radius: var(--radius-sm); }
        #timer { 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin-bottom: 1rem;
            color: var(--primary-purple);
            font-family: var(--font-family-mono);
        }
        .photo-viewer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: var(--radius-lg);
        }
        .photo-viewer img {
            max-width: 100%;
            max-height: 400px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">H</div>
                <span>Хогвартс</span>
            </a>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="check.html" class="nav-link">Проверка</a>
                <a href="archive.html" class="nav-link" id="archive-nav-link">Архив</a>
                <a href="online_test.html" class="nav-link active">Онлайн тест</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </div>
            <div class="nav-controls">
                <span id="user-name" style="color: var(--text-muted); margin-right: 1rem;"></span>
                <button class="btn btn-primary" id="logout-btn" style="padding: 0.5rem 1rem; font-size: 0.9rem;">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </button>
                <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <main style="padding-top: 100px; min-height: calc(100vh - 200px);">
        <div class="container">
            <div class="section-header">
                <h1 class="section-title text-gradient">Онлайн тест</h1>
                <p class="section-subtitle">Выберите вариант теста для начала</p>
            </div>

            <div id="section-info" style="text-align: center; margin-bottom: 1rem; font-size: 1.25rem; color: var(--text-muted);"></div>

            <!-- Photo viewer -->
            <div class="photo-viewer" id="photoViewer" style="display:none;">
                <button id="prevImg" class="btn btn-secondary"><i class="fas fa-chevron-left"></i></button>
                <img id="currentPhoto" src="" alt="Photo">
                <button id="nextImg" class="btn btn-secondary"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="test-list" id="testList"></div>
            
            <div id="testContainer" style="display:none;">
                <div style="text-align: center;">
                    <div id="timer"></div>
                </div>
                <div id="questionContainer"></div>
                <div class="controls" style="margin-top: 2rem; text-align: center;">
                    <button id="nextBtn" class="btn btn-secondary" style="margin-right: 1rem;">
                        <i class="fas fa-arrow-right"></i> Следующий раздел
                    </button>
                    <button id="submitBtn" class="btn btn-primary" style="display:none;">
                        <i class="fas fa-check"></i> Завершить тест
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo"><i class="fas fa-hat-wizard"></i> Хогвартс</div>
            <div class="footer-copy">© 2024 Школа Чародейства и Волшебства</div>
        </div>
    </footer>
    <script>
        const sec_names = ['Math 1', 'Math 2', 'ADP', 'Reading', 'Grammer'];
        const sections = [
            { questions: 30, choices: 4, duration: 30 },
            { questions: 30, choices: 5, duration: 60 },
            { questions: 30, choices: 4, duration: 30 },
            { questions: 30, choices: 4, duration: 60 },
            { questions: 30, choices: 4, duration: 45 },
        ];
        let currentSection = 0;
        let selectedVariant = '';
        let answers = [];
        let timerInterval;
        let photosData = [];
        let currentPhotoIndex = 0;

        function showPhoto() {
            if (photosData.length === 0) return;
            const img = document.getElementById('currentPhoto');
            img.src = `data:image/*;base64,${photosData[currentPhotoIndex]}`;
        }

        document.getElementById('prevImg').onclick = () => {
            if (photosData.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex - 1 + photosData.length) % photosData.length;
            showPhoto();
        };
        document.getElementById('nextImg').onclick = () => {
            if (photosData.length === 0) return;
            currentPhotoIndex = (currentPhotoIndex + 1) % photosData.length;
            showPhoto();
        };

        async function fetchTests() {
            try {
                const res = await fetch('http://localhost:8000/tests');
                if (!res.ok) throw new Error('Failed to fetch tests');
                const testsList = await res.json(); // returns array of strings
                return testsList.map((name, idx) => ({ id: idx + 1, name }));
            } catch (err) {
                console.error(err);
                return [];
            }
        }

        function renderTestList(tests) {
            const list = document.getElementById('testList');
            tests.forEach(test => {
                const btn = document.createElement('div');
                btn.className = 'test-item';
                btn.textContent = test.name;
                btn.onclick = (e) => selectTest(test, e.target);
                list.appendChild(btn);
            });
        }

        async function selectTest(test, element) {
            selectedVariant = test.name;
            document.querySelectorAll('.test-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('testList').style.display = 'none';
            document.getElementById('testContainer').style.display = 'block';

            // fetch test with photos
            const res = await fetch(`http://localhost:8000/test/${selectedVariant}`);
            if (res.ok) {
                let data = await res.json();

                photosData = data.photos
                photosData.sort()
                photosData.reverse()
                currentPhotoIndex = 0;
                document.getElementById('photoViewer').style.display = 'flex';
                showPhoto();
            }

            startSection(0);
        }

        function startSection(idx) {
            clearInterval(timerInterval);
            currentSection = idx;
            // Initialize answer tracking: count and choice index
            answers[idx] = Array.from({ length: sections[idx].questions }, () => ({ count: 0, choice: null }));
            document.getElementById('section-info').textContent =
                `${sec_names[idx]} - ${sections[idx].duration} min`;
            document.getElementById('nextBtn').style.display = idx < sections.length - 1 ? 'inline-block' : 'none';
            document.getElementById('submitBtn').style.display = idx === sections.length - 1 ? 'inline-block' : 'none';
            renderSectionQuestions(idx);
            startTimer(sections[idx].duration * 60);
        }

        function startTimer(seconds) {
            const timerEl = document.getElementById('timer');
            let remaining = seconds;
            timerEl.textContent = formatTime(remaining);
            timerInterval = setInterval(() => {
                if (--remaining <= 0) {
                    clearInterval(timerInterval);
                    autoNextOrSubmit();
                } else {
                    timerEl.textContent = formatTime(remaining);
                }
            }, 1000);
        }

        function formatTime(sec) {
            const m = String(Math.floor(sec / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            return `${m}:${s}`;
        }

        function renderSectionQuestions(sectionIdx) {
            const { questions, choices } = sections[sectionIdx];
            const container = document.getElementById('questionContainer');
            container.innerHTML = '';
            for (let q = 0; q < questions; q++) {
                const row = document.createElement('div');
                row.className = 'question-row';
                row.dataset.qIndex = q;
                const label = document.createElement('div');
                label.textContent = q + 1;
                row.appendChild(label);
                const choicesDiv = document.createElement('div');
                choicesDiv.className = 'choices';
                for (let c = 0; c < choices; c++) {
                    const choice = document.createElement('div');
                    choice.className = 'choice';
                    choice.textContent = String.fromCharCode(1072 + c);
                    choice.onclick = () => selectChoice(sectionIdx, q, c, choice);
                    choicesDiv.appendChild(choice);
                }
                row.appendChild(choicesDiv);
                container.appendChild(row);
            }
        }

        function selectChoice(section, question, choiceIdx, el) {
            const ans = answers[section][question];
            if (ans.count >= 2) return; // no more changes
            const row = el.parentElement;
            // clear styles on all choices
            row.querySelectorAll('.choice').forEach(c => c.classList.remove('selected', 'first', 'changed'));
            // increment count
            ans.count++;
            ans.choice = choiceIdx;
            // apply style
            if (ans.count === 1) {
                el.classList.add('selected', 'first');
            } else if (ans.count === 2) {
                el.classList.add('selected', 'changed');
            }
        }

        function autoNextOrSubmit() {
            if (currentSection < sections.length - 1) startSection(currentSection + 1);
            else submitResults();
        }

        document.getElementById('nextBtn').onclick = () => {
            clearInterval(timerInterval);
            autoNextOrSubmit();
        };
        document.getElementById('submitBtn').onclick = submitResults;

        // Navigation and user handling
        document.getElementById('mobile-menu-toggle').addEventListener('click', function() {
            document.getElementById('nav-menu').classList.toggle('active');
            this.classList.toggle('active');
        });

        document.getElementById('logout-btn').addEventListener('click', function() {
            localStorage.clear();
            window.location.href = 'login.html';
        });

        const username = localStorage.getItem('username');
        if (username) document.getElementById('user-name').textContent = username;

        const role = localStorage.getItem('role');
        if (role === 'student') {
            document.getElementById('archive-nav-link').style.display = 'none';
        }

        async function submitResults() {
            clearInterval(timerInterval);
            // Prepare answers payload
            const role = localStorage.getItem('role') || '';
            const response = answers.flat().map(ans => ans.choice === null ? '(пусто)' : String.fromCharCode(1072 + ans.choice));
            const selected = response
            const formData = new FormData();
            formData.append("role", role);
            response.forEach(item => formData.append("response", item));

            try {
                const response = await fetch(`http://localhost:8000/check3/${selectedVariant}`, {
                method: "POST",
                body: formData
                });

                if (!response.ok) throw new Error('Submission failed');
                const result = await response.json();
                const correctAnswers = result.result;

                let outputHTML = `
                    <div class="section-header">
                        <h2 class="section-title text-gradient"><i class="fas fa-trophy" style="margin-right: 0.5rem;"></i>Результаты</h2>
                        <div style="font-size: 3rem; font-weight: 700; color: var(--primary-purple); margin: 1rem 0;">${result.score}</div>
                        <p class="section-subtitle">Ваш счет</p>
                    </div>
                    <div style="display: grid; gap: 0.5rem; max-width: 600px; margin: 0 auto;">
                `;

                for (let i = 0; i < correctAnswers.length; i++) {
                    const correct = correctAnswers[i];
                    const user = selected[i];
                    const isCorrect = user === correct;

                    outputHTML += `
                        <div style="display: flex; justify-content: space-between; padding: 0.75rem; background: ${isCorrect ? 'rgba(34, 197, 94, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; border-radius: var(--radius-md); border-left: 4px solid ${isCorrect ? '#22c55e' : '#ef4444'};">
                            <span>Вопрос ${i + 1}</span>
                            <span>
                                <span style="color: ${isCorrect ? '#22c55e' : '#ef4444'}; font-weight: 600;">${user}</span>
                                ${!isCorrect ? `<span style="color: #22c55e; margin-left: 0.5rem;">→ ${correct}</span>` : ''}
                            </span>
                        </div>
                    `;
                }
                outputHTML += '</div><div style="text-align: center; margin-top: 2rem;"><a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> На главную</a></div>';

                document.querySelector('.container').innerHTML = outputHTML;
            } catch (err) {
                console.error(err);
                document.querySelector('.container').innerHTML = `
                    <div class="alert alert-error" style="max-width: 600px; margin: 2rem auto;">
                        <i class="fas fa-exclamation-circle"></i> Ошибка отправки. Попробуйте снова.
                    </div>
                    <div style="text-align: center;">
                        <a href="index.html" class="btn btn-primary">На главную</a>
                    </div>
                `;
            }
        }

        (async () => {
            const tests = await fetchTests();
            renderTestList(tests);
        })();
    </script>
</body>
</html>
