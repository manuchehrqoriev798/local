<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Хогвартс</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-fadeIn">
            <div class="auth-header">
                <div class="auth-logo">H</div>
                <h1 class="auth-title">Регистрация</h1>
                <p class="auth-subtitle">Создайте аккаунт в Хогвартсе</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user" style="margin-right: 0.5rem; color: var(--primary-purple);"></i>Имя пользователя
                    </label>
                    <input type="text" id="username" class="form-input" placeholder="Придумайте имя пользователя" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope" style="margin-right: 0.5rem; color: var(--primary-purple);"></i>Email
                    </label>
                    <input type="email" id="email" class="form-input" placeholder="Введите email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock" style="margin-right: 0.5rem; color: var(--primary-purple);"></i>Пароль
                    </label>
                    <input type="password" id="password" class="form-input" placeholder="Придумайте пароль" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">
                        <i class="fas fa-hat-wizard" style="margin-right: 0.5rem; color: var(--primary-purple);"></i>Роль
                    </label>
                    <select id="role" class="form-select" required>
                        <option value="" disabled selected>Выберите роль</option>
                        <option value="student">Ученик</option>
                        <option value="admin">Администратор</option>
                    </select>
                </div>

                <div class="alert alert-error" id="responseMessage" style="display: none;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>
            </form>

            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/auth/register';

        document.getElementById('registerForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password, role })
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Регистрация успешна! Перенаправление на страницу входа...');
                    window.location.href = 'login.html';
                } else {
                    const msgDiv = document.getElementById('responseMessage');
                    msgDiv.innerText = result.detail || 'Ошибка регистрации.';
                    msgDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Error during registration:', error);
                const msgDiv = document.getElementById('responseMessage');
                msgDiv.innerText = 'Произошла ошибка. Попробуйте снова.';
                msgDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
