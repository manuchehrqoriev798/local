<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - Хогвартс</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card animate-fadeIn">
      <div class="auth-header">
        <div class="auth-logo">H</div>
        <h1 class="auth-title">Вход в Хогвартс</h1>
        <p class="auth-subtitle">Школа Чародейства и Волшебства</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">
            <i class="fas fa-user" style="margin-right: 0.5rem; color: var(--primary-purple);"></i>Имя пользователя
          </label>
          <input type="text" id="username" class="form-input" placeholder="Введите имя пользователя" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            <i class="fas fa-lock" style="margin-right: 0.5rem; color: var(--primary-purple);"></i>Пароль
          </label>
          <input type="password" id="password" class="form-input" placeholder="Введите пароль" required>
        </div>

        <div class="alert alert-error" id="errorMsg" style="display: none;"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-sign-in-alt"></i> Войти
        </button>
      </form>

      <div class="auth-footer">
        <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
        <p style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted);">
          <i class="fas fa-info-circle"></i> Демо: HogwartsMaster2024SecureAccess / AlohomoraLumosNoxExpectoPatronum2024
        </p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        errorMsg.style.display = 'none';

        try {
          // Default admin bypass
          if (user === 'HogwartsMaster2024SecureAccess' && pass === 'AlohomoraLumosNoxExpectoPatronum2024') {
            localStorage.setItem('role', 'admin');
            localStorage.setItem('username', 'HogwartsMaster2024SecureAccess');
            window.location.href = 'index.html';
            return;
          }

          // Try backend
          const res = await fetch(`http://localhost:8000/profiles/${encodeURIComponent(user)}`);
          if (!res.ok) {
            throw new Error('Ошибка при получении профиля');
          }

          const data = await res.json();

          if (data.username === user &&
              data.password === pass &&
              data.is_verified) {
            localStorage.setItem('role', data.role);
            localStorage.setItem('username', data.username);
            window.location.href = 'index.html';
          } else {
            throw new Error('Неверное имя пользователя или пароль');
          }
        } catch (err) {
          errorMsg.textContent = err.message;
          errorMsg.style.display = 'block';
        }
      });
    })();
  </script>
</body>
</html>
