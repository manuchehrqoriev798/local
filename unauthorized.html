<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Доступ запрещен - Хогвартс</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--gradient-hero);">
    <div class="auth-card animate-fadeIn" style="text-align: center;">
        <div style="font-size: 4rem; color: var(--primary-gold); margin-bottom: 1rem;">
            <i class="fas fa-lock"></i>
        </div>
        <h1 style="font-family: var(--font-family-heading); font-size: 2rem; margin-bottom: 1rem;">403 — Доступ запрещен</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">У вас нет прав для доступа к этой странице</p>
        <button onclick="localStorage.clear(); location.href='login.html'" class="btn btn-primary">
            <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
    </div>
</body>
</html>
